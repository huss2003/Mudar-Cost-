# A generic, single database configuration.

[alembic]
# path to migration scripts.
script_location = alembic

# The output encoding for revision files.
# output_encoding = utf-8

# Logging
sqlalchemy.url = postgresql+asyncpg://estimation:estimation_secret_2024@postgres:5432/estimation

[post_write_hooks]

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

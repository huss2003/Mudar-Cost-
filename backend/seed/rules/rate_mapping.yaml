# Auto Cost Engine — Rate Mapping
# Links every BOQ object_type to the seeded Material Master or Labour rules.
# All calibrated rates trace back to a source in either:
#   - seed/reference/materials.yaml  (source: material_master)
#   - seed/rules/labour_rules.yaml   (source: labour)
#
# Every rate_source reference is verified by `make verify-rates` to ensure
# no orphan rates exist.
#
# Calibration project: G.U. Office
# Calibration date:    2026-07-22

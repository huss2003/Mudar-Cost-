networks:
  estimation-net:
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ace-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: estimation
      POSTGRES_USER: estimation
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-estimation_secret_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estimation"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - estimation-net

  minio:
    image: minio/minio:latest
    container_name: ace-minio
    restart: unless-stopped
    command: server /data --console-address :9001
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-estimation_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret_2024}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - estimation-net

  redis:
    image: redis:7-alpine
    container_name: ace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - estimation-net

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: ace-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_USERNAME: estimation
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-estimation_secret_2024}
      KC_DB_URL_DATABASE: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_secret_2024}
      KC_HOSTNAME_URL: http://localhost:8080
      KC_HOSTNAME_ADMIN_URL: http://localhost:8080
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - estimation-net

  caddy:
    image: caddy:2-alpine
    container_name: ace-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - estimation-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ace-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - estimation-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ace-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - estimation-net

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ace-celery-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker -l info
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - estimation-net

volumes:
  pgdata:
  minio_data:
  redis_data:

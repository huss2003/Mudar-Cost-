# Auto Cost Engine — BOQ Expansion Rule Library
# Each rule defines how a detected object type expands into line items
# with quantity formulas, materials, labour, and wastage.

rules:
  - object_type: gypsum_partition
    name: "Gypsum Board Partition"
    description: "Standard 4-inch (100mm) gypsum partition with metal stud frame, gypsum boards both sides, insulation, finishing"
    trade: partition
    formula: "Area (sqm) = Length × Height"
    sub_items:
      - material_code: metal_stud_75mm
        description: "Galvanized metal stud 75mm @ 600mm centers"
        formula: "ceil(L / 0.6) + 1"
        unit: nos
        default_material: "Metal Stud 75mm"
        wastage_pct: 3
        trade: partition

      - material_code: channel_75mm
        description: "Galvanized channel 75mm top & bottom"
        formula: "L * 2"
        unit: lnm
        default_material: "Channel 75mm"
        wastage_pct: 3
        trade: partition

      - material_code: gypsum_board_12mm
        description: "Gypsum board 12mm (two layers each side)"
        formula: "A * 4"
        unit: sqm
        default_material: "Gypsum Board 12mm"
        wastage_pct: 7
        trade: partition

      - material_code: insulation_50mm
        description: "Glass wool insulation 50mm"
        formula: "A"
        unit: sqm
        default_material: "Glass Wool Insulation 50mm"
        wastage_pct: 3
        trade: partition

      - material_code: drywall_screws
        description: "Drywall screws 25mm"
        formula: "A * 25"
        unit: nos
        default_material: "Drywall Screws 25mm"
        wastage_pct: 5
        trade: partition

      - material_code: joint_tape
        description: "Joint tape for gypsum boards"
        formula: "H * 2 * 2"
        unit: lnm
        default_material: "Joint Tape 50mm"
        wastage_pct: 5
        trade: partition

      - material_code: joint_compound
        description: "Joint compound (20 kg bag)"
        formula: "ceil(A * 0.3)"
        unit: kg
        default_material: "Joint Compound"
        wastage_pct: 10
        trade: partition

      - material_code: skim_coat
        description: "Skim coat putty"
        formula: "A * 2"
        unit: sqm
        default_material: "Skim Coat Putty"
        wastage_pct: 10
        trade: painting

      - material_code: primer
        description: "Water-based primer"
        formula: "A * 2"
        unit: sqm
        default_material: "Water Based Primer"
        wastage_pct: 10
        trade: painting

      - material_code: emulsion_paint
        description: "Interior emulsion paint (2 coats)"
        formula: "A * 2 * 2"
        unit: sqm
        default_material: "Interior Emulsion Paint"
        wastage_pct: 10
        trade: painting

      - labour_code: partition_labour
        description: "Partition installation labour"
        formula: "A"
        unit: sqm
        trade: partition
        skill_level: skilled
        crew_size: 2

      - labour_code: painting_labour
        description: "Painting labour (putty + primer + paint)"
        formula: "A * 2"
        unit: sqm
        trade: painting
        skill_level: skilled
        crew_size: 1

  - object_type: false_ceiling
    name: "False Ceiling (POP/Gypsum)"
    description: "False ceiling with metal grid, gypsum/POP boards, and finishing"
    trade: ceiling
    formula: "Area (sqm) = Length × Width"
    sub_items:
      - material_code: ceiling_grid_primary
        description: "Primary T-grid @1200mm centers"
        formula: "ceil(L / 1.2) * W"
        unit: lnm
        default_material: "T-Grid Primary 3600mm"
        wastage_pct: 3
        trade: ceiling

      - material_code: ceiling_grid_cross
        description: "Cross T-grid @600mm centers"
        formula: "ceil(W / 0.6) * L"
        unit: lnm
        default_material: "T-Grid Cross 1200mm"
        wastage_pct: 3
        trade: ceiling

      - material_code: ceiling_board
        description: "Gypsum ceiling board 12mm"
        formula: "A"
        unit: sqm
        default_material: "Gypsum Ceiling Board 12mm"
        wastage_pct: 7
        trade: ceiling

      - material_code: ceiling_wall_angle
        description: "Wall angle L-section"
        formula: "(L + W) * 2"
        unit: lnm
        default_material: "Wall Angle 25mm"
        wastage_pct: 3
        trade: ceiling

      - material_code: ceiling_hangers
        description: "Adjustable hangers @1200mm centers"
        formula: "ceil(L / 1.2) * ceil(W / 1.2)"
        unit: nos
        default_material: "Adjustable Hanger Assembly"
        wastage_pct: 2
        trade: ceiling

      - material_code: pop_finish
        description: "POP finishing (if applicable)"
        formula: "A"
        unit: sqm
        default_material: "POP Finish"
        wastage_pct: 10
        trade: ceiling

      - material_code: ceiling_primer
        description: "Ceiling primer"
        formula: "A"
        unit: sqm
        default_material: "Ceiling Primer"
        wastage_pct: 10
        trade: painting

      - material_code: ceiling_paint
        description: "Ceiling emulsion paint (2 coats)"
        formula: "A * 2"
        unit: sqm
        default_material: "Ceiling Emulsion Paint"
        wastage_pct: 10
        trade: painting

      - labour_code: ceiling_labour
        description: "False ceiling installation labour"
        formula: "A"
        unit: sqm
        trade: ceiling
        skill_level: skilled
        crew_size: 2


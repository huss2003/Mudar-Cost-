# Auto Cost Engine — Wastage Rules Library
# Standard material wastage percentages for interior fit-out
# Simple format: object_type → wastage_pct

rules:
  - object_type: tile
    wastage_pct: 8
    description: "Ceramic/vitrified tiles — 8% for cutting and breakage"
    applicable_to: material
    is_mandatory: true

  - object_type: carpet
    wastage_pct: 5
    description: "Carpet — 5% for trimming and pattern matching"
    applicable_to: material
    is_mandatory: true

  - object_type: glass
    wastage_pct: 2
    description: "Toughened glass — 2% (pre-fabricated, minimal on-site cutting)"
    applicable_to: material
    is_mandatory: true

  - object_type: paint
    wastage_pct: 15
    description: "Interior emulsion paint — 15% for overspray, touch-ups, and wastage"
    applicable_to: material
    is_mandatory: true

  - object_type: gypsum_board
    wastage_pct: 7
    description: "Gypsum board — 7% for cutouts, offcuts, and openings"
    applicable_to: material
    is_mandatory: true

  - object_type: laminate
    wastage_pct: 5
    description: "Laminate flooring — 5% for cutting and fitting"
    applicable_to: material
    is_mandatory: true

  - object_type: waterproofing
    wastage_pct: 10
    description: "Waterproofing compound — 10% for uneven application and mixing residue"
    applicable_to: material
    is_mandatory: true

  - object_type: electrical
    wastage_pct: 3
    description: "Electrical components — 3% for stripping and termination waste"
    applicable_to: material
    is_mandatory: true

  - object_type: hvac
    wastage_pct: 2
    description: "HVAC equipment — 2% for installation losses"
    applicable_to: material
    is_mandatory: true

  - object_type: plumbing
    wastage_pct: 5
    description: "Plumbing pipes and fittings — 5% for cutting and jointing waste"
    applicable_to: material
    is_mandatory: true

